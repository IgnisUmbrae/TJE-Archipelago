# This is an example YAML for ToeJam & Earl, intended as a quickstart using "typical" settings.
#
# For a full overview of all of the options, run "Generate Template Options"
# in the Archipelago Launcher and check /Players/Templates/ToeJam and Earl.yaml.
name: Bro
game: ToeJam and Earl
ToeJam and Earl:
  # Basic Items/Locations
  islandless: yes
  map_rando: full_random

  # Auto/bad/trap options
  bad_food: yes
  bad_presents: yes
  auto_bad_presents: no_randomizer
  auto_buck_presents: yes
  trap_weights:
    cupid: 2
    burp: 2
    sleep: 2
    earthling: 3
    skates: 1
    randomizer: 0
  trap_percentage: 3

  # Extra items/locations
  upwarp_present: yes
  map_reveals: yes
  elevator_keys: yes
  key_gap: 4
  max_rank_check: bro
  reach_level_checks: yes
  mailbox_checks: yes
  lemonade_check: yes
  point_presents: yes
  auto_point_presents: yes

  # Difficulty/QoL
  character: toejam
  game_overs: drop_down
  earthling_rando: nice_random
  earthling_rando_niceness: 7
  sleep_when_idle: no
  fast_loads: yes
  expanded_inventory: yes

  # Misc
  unused_present_sprites: yes
